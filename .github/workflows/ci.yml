# CI for pbyk. Based on the draft in bah_docs pbyk_review_20260711_pm.md §6 (T-1),
# adapted to the current tree: default branch is main (not master), the workspace is
# virtual (env features need package/feature syntax), and the legacy_p12 arm exists.
#
# Offline-clean by design: the test job uses --lib, which runs the src/ unit tests
# and never builds tests/ (portal_status_check.rs / scep.rs phone home to
# pb2.redhoundsoftware.net + a DoD CA). If a `net` feature is later added to gate
# those, switch to `cargo test --workspace --locked` without --features net.
name: CI

on:
  push:
    branches: [ "main", "pre-release" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # The regression gate: offline unit tests only (no network, no hardware).
  test:
    name: test (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --lib --locked
      # The legacy_p12 arm (RC2/3DES/SHA-1 PKCS #12 parsing) is off by default;
      # keep its test coverage alive.
      - run: cargo test -p pbyklib --lib --locked --features legacy_p12

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo fmt --all --check

  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # Every deployment environment must compile (exactly one env feature each; the
  # workspace is virtual, so features are addressed per package).
  build-env:
    name: build (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, nipr, sipr, om_nipr, om_sipr]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --no-default-features --features pbyk/${{ matrix.env }},pbyklib/${{ matrix.env }},pbykcorelib/${{ matrix.env }} --locked

  # Keep the Windows/VSC backend compiling — it never builds on the Linux jobs.
  # Build-only: running the VSC tests needs a live cert store.
  windows-vsc:
    name: build vsc (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p pbyklib --features vsc --locked

  msrv:
    name: msrv 1.88.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked
